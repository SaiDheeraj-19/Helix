services:
  - type: web
    name: helix-backend
    env: python
    plan: free
    region: ohio
    buildCommand: "cd backend && pip install poetry && poetry config virtualenvs.create false && poetry install --only main"
    startCommand: "cd backend && uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_SECURE
        sync: false
      - key: MINIO_ENABLED
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: "*"
