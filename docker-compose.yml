# =============================================================================
# Helix — Docker Compose (Development)
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  helix-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  qdrant_data:

services:

  # ──────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: helix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helix}
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - helix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ──────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: helix-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - helix-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ──────────────────────────────────────────
  # RabbitMQ 3.13
  # ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: helix-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-helix}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-helix_dev_password}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"   # Management UI
    networks:
      - helix-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ──────────────────────────────────────────
  # MinIO (S3-compatible storage)
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: helix-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console UI
    networks:
      - helix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ──────────────────────────────────────────
  # Qdrant (Vector database)
  # ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: helix-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"    # gRPC
    networks:
      - helix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ──────────────────────────────────────────
  # Backend (FastAPI)
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/backend.Dockerfile
      target: development
    container_name: helix-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix_dev_password}@postgres:5432/${POSTGRES_DB:-helix}
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-helix}:${RABBITMQ_PASSWORD:-helix_dev_password}@rabbitmq:5672/
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/alembic:/app/alembic:ro
    ports:
      - "8000:8000"
    networks:
      - helix-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ──────────────────────────────────────────
  # Frontend (Next.js)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
      target: development
    container_name: helix-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    ports:
      - "3000:3000"
    networks:
      - helix-net
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging

  # ──────────────────────────────────────────
  # Nginx (Reverse Proxy)
  # ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: helix-nginx
    restart: unless-stopped
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - helix-net
    depends_on:
      - frontend
      - backend
    logging: *default-logging
